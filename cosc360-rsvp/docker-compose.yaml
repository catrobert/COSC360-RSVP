services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/cosc360-rsvp
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
    depends_on:
      - backend
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules

volumes:
  mongo_data:
  backend_node_modules:
  frontend_node_modules: